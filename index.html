<!DOCTYPE html>

d="M720 400 A320 320 0 0 1 400 720 L400 400 Z"/>

<path class="division security"
d="M400 720 A320 320 0 0 1 80 400 L400 400 Z"/>

d="M80 400 A320 320 0 0 1 400 80 L400 400 Z"/>

<rect x="250" y="350" width="300" height="200" fill="#222"/>

</svg>

</div>

<div id="infoPanel" class="hidden">

</div>
